<div class="conseils-container">
    <div class="content-layout">
  
      <!-- ✅ SIDEBAR EN PREMIER dans le HTML (= en haut sur mobile) -->
      <aside class="sidebar">
        <h2 class="sidebar-title">Catégories</h2>
        <div class="category-item"
             *ngFor="let cat of categories"
             [class.active]="selectedCategorie === cat"
             (click)="filterByCategorie(cat)">
          <span class="category-name">{{ cat }}</span>
          <div class="category-arrow">›</div>
        </div>
      </aside>
  
      <!-- ✅ ARTICLES EN SECOND (= en bas sur mobile, à gauche sur desktop) -->
      <div class="articles-section">
        <div *ngIf="!loading && !error && publications.length === 0" class="empty-state">
          <div>🔍</div>
          <h3>Aucun article n'a été publié</h3>
        </div>
        <div class="article-card" *ngFor="let publication of publications">
          <div class="article-image">
            <img *ngIf="publication.imageUrl"
                 [src]="publication.imageUrl"
                 [alt]="publication.titre"
                 (error)="onImageError($event)">
          </div>
          <div class="article-content">
            <div class="article-meta">
              <span>📅 {{ formatDate(publication.datePublication) }}</span>
            </div>
            <h3 class="article-title">{{ publication.titre }}</h3>
            <p class="article-excerpt">{{ publication.contenu?.substring(0, 150) }}...</p>
            <a href="#" class="read-more">Lire plus →</a>
          </div>
        </div>
      </div>
  
    </div>
  </div>
