<!--::header part start::-->
<header class="main_menu home_menu">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-12">
                <nav class="navbar navbar-expand-lg navbar-light">
                    <a class="navbar-brand" routerLink="/Dash">
                        <img src="assets/img/logo.png" alt="logo">
                    </a>

                    <button class="navbar-toggler" type="button"
                        (click)="toggleMenu()"
                        aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse main-menu-item justify-content-center"
                        [class.show]="menuOpen"
                        id="navbarSupportedContent">
                        <ul class="navbar-nav align-items-center">
                            <li class="nav-item active">
                                <a class="nav-link" routerLink="/Dash">{{ 'home' | translate }}</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" routerLink="/conseil">{{ 'wellness' | translate }}</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" routerLink="/About">{{ 'about' | translate }}</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" routerLink="/Cont">{{ 'contact' | translate }}</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">{{ 'resources' | translate }}</a>
                                <ul>
                                    <li><a routerLink="/Doc">{{ 'service' | translate }}</a></li>
                                    <li><a routerLink="/Publications">{{ 'healthNews' | translate }}</a></li>
                                    <li><a href="#">{{ 'helpCenter' | translate }}</a></li>
                                </ul>
                            </li>
                        </ul>
                    </div>

                    <div class="header-container">
                        <div class="language-selector">
                            <!-- Sélecteur de langue désactivé -->
                        </div>
                    </div>

                </nav>
            </div>
        </div>
    </div>
</header>
<!--::header part end::-->
